  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; background:#f0f2f5; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: white; padding: 12px 20px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15); flex-shrink:0;
    }
    header h1 { font-size:18px; font-weight:600; letter-spacing:1px; }
    header .subtitle { font-size:12px; opacity:.8; }
    .header-btns { display:flex; gap:8px; flex-shrink:0; }
    .hbtn {
      background: rgba(255,255,255,.18); color:white;
      border: 1px solid rgba(255,255,255,.35);
      padding: 7px 13px; font-size:12px; border-radius:8px;
      cursor:pointer; white-space:nowrap; font-family:inherit; font-weight:500;
      transition: background .15s;
    }
    .hbtn:hover { background: rgba(255,255,255,.28); }

    /* ===== WORKSPACE ===== */
    .workspace {
      flex:1; display:grid; grid-template-columns:1fr 1fr 1fr;
      gap:14px; padding:14px; overflow:hidden;
    }
    .panel {
      background:white; border-radius:12px; display:flex; flex-direction:column;
      box-shadow:0 2px 12px rgba(0,0,0,.08); overflow:hidden;
    }
    .panel-header {
      padding:12px 14px 9px; display:flex; align-items:center;
      justify-content:space-between; border-bottom:2px solid #f0f0f0; flex-shrink:0;
    }
    .panel-title { display:flex; align-items:center; gap:7px; font-size:14px; font-weight:600; color:#1a1a2e; }
    .panel-icon { width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .panel-1 .panel-icon { background:#e8f4fd; }
    .panel-2 .panel-icon { background:#e8f8f0; }
    .panel-3 .panel-icon { background:#fef3e8; }

    .panel-right { display:flex; align-items:center; gap:5px; }
    .word-count { font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px; min-width:52px; text-align:center; transition:transform .3s; }
    .panel-1 .word-count { background:#e8f4fd; color:#1a73e8; }
    .panel-2 .word-count { background:#e8f8f0; color:#0f9d58; }
    .panel-3 .word-count { background:#fef3e8; color:#f4511e; }
    .word-count.pulse { transform:scale(1.15); }

    /* 小图标按钮 */
    .icon-btn { background:transparent; border:none; color:#ccc; padding:3px 6px; font-size:13px; cursor:pointer; border-radius:5px; line-height:1; }
    .icon-btn:hover { color:#666; background:#f5f5f5; }

    /* 导出下拉 */
    .export-wrap { position:relative; }
    .export-btn { background:#f5f5f5; border:none; color:#666; padding:4px 8px; font-size:12px; border-radius:6px; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .export-btn:hover { background:#eee; }
    .export-menu {
      display:none; position:absolute; right:0; top:calc(100% + 4px); z-index:100;
      background:white; border:1px solid #e5e5e5; border-radius:9px;
      box-shadow:0 4px 16px rgba(0,0,0,.12); min-width:130px; overflow:hidden;
    }
    .export-menu.open { display:block; }
    .export-menu a {
      display:block; padding:9px 14px; font-size:13px; color:#333;
      text-decoration:none; cursor:pointer; transition:background .1s;
    }
    .export-menu a:hover { background:#f5f5f5; }
    .export-menu a + a { border-top:1px solid #f0f0f0; }

    /* 进度条 */
    .progress-bar { width:100%; height:3px; background:#f5f5f5; flex-shrink:0; }
    .progress-fill { height:100%; transition:width .3s; width:0%; }
    .panel-1 .progress-fill { background:#1a73e8; }
    .panel-2 .progress-fill { background:#0f9d58; }
    .panel-3 .progress-fill { background:#f4511e; }

    textarea {
      flex:1; border:none; outline:none; padding:13px 14px;
      font-size:13.5px; line-height:1.85; color:#333; resize:none;
      font-family:inherit; background:transparent;
    }
    textarea::placeholder { color:#bbb; }

    /* TTS footer */
    .panel-footer {
      padding:9px 14px; border-top:1px solid #f0f0f0;
      display:flex; align-items:center; gap:7px; flex-shrink:0; background:#fafafa;
    }
    .tts-controls { display:flex; align-items:center; gap:6px; flex:1; flex-wrap:wrap; }
    .btn { border:none; border-radius:7px; padding:6px 12px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:500; display:flex; align-items:center; gap:4px; transition:all .15s; }
    .btn:active { transform:scale(.96); }
    .btn-play { background:linear-gradient(135deg,#f4511e,#ff7043); color:white; }
    .btn-play:hover { background:linear-gradient(135deg,#e64a19,#f4511e); }
    .btn-play.playing { background:linear-gradient(135deg,#e53935,#c62828); }
    .btn-stop { background:#f5f5f5; color:#888; }
    .btn-stop:hover { background:#ebebeb; }
    .speed-select, .voice-select {
      border:1px solid #ddd; border-radius:6px; padding:4px 7px;
      font-size:11px; background:white; color:#555; cursor:pointer;
    }
    .voice-select { max-width:100px; }
    .tts-status { font-size:11px; color:#aaa; }
    .tts-status.active { color:#f4511e; }

    /* ===== 版本保存弹窗 ===== */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
      z-index:500; align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:white; border-radius:14px; padding:28px;
      width:420px; max-width:90vw; box-shadow:0 8px 40px rgba(0,0,0,.2);
    }
    .modal h2 { font-size:17px; margin-bottom:18px; color:#1a1a2e; }
    .modal label { font-size:13px; color:#555; display:block; margin-bottom:5px; }
    .modal input, .modal textarea.modal-ta {
      width:100%; border:1px solid #ddd; border-radius:8px;
      padding:9px 12px; font-size:13px; font-family:inherit;
      outline:none; margin-bottom:14px; resize:vertical;
    }
    .modal input:focus, .modal textarea.modal-ta:focus { border-color:#667eea; }
    .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
    .modal-btn-cancel { background:#f5f5f5; color:#666; border:none; border-radius:8px; padding:9px 18px; font-size:13px; cursor:pointer; font-family:inherit; }
    .modal-btn-save { background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:8px; padding:9px 18px; font-size:13px; cursor:pointer; font-family:inherit; font-weight:600; }
    .modal-btn-cancel:hover { background:#eee; }

    /* ===== 版本历史抽屉 ===== */
    .drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:400; }
    .drawer-overlay.open { display:block; }
    .drawer {
      position:fixed; top:0; right:-420px; width:400px; height:100vh;
      background:white; box-shadow:-4px 0 24px rgba(0,0,0,.15);
      z-index:401; display:flex; flex-direction:column;
      transition:right .25s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { right:0; }
    .drawer-header {
      padding:18px 20px; border-bottom:1px solid #f0f0f0;
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .drawer-header h2 { font-size:16px; color:#1a1a2e; }
    .drawer-close { background:none; border:none; font-size:20px; cursor:pointer; color:#999; line-height:1; }
    .drawer-close:hover { color:#333; }
    .drawer-body { flex:1; overflow-y:auto; padding:14px; }
    .version-card {
      border:1px solid #efefef; border-radius:10px; padding:14px;
      margin-bottom:10px; transition:border-color .15s;
    }
    .version-card:hover { border-color:#c5b8f0; }
    .version-title { font-size:14px; font-weight:600; color:#1a1a2e; margin-bottom:4px; }
    .version-desc { font-size:12px; color:#888; margin-bottom:8px; line-height:1.5; }
    .version-meta { font-size:11px; color:#bbb; margin-bottom:10px; }
    .version-counts { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .version-counts span { font-size:11px; padding:2px 8px; border-radius:12px; }
    .vc1 { background:#e8f4fd; color:#1a73e8; }
    .vc2 { background:#e8f8f0; color:#0f9d58; }
    .vc3 { background:#fef3e8; color:#f4511e; }
    .version-actions { display:flex; gap:8px; }
    .vbtn { border:none; border-radius:7px; padding:6px 12px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:500; }
    .vbtn-load { background:linear-gradient(135deg,#667eea,#764ba2); color:white; }
    .vbtn-load:hover { opacity:.9; }
    .vbtn-del { background:#ffeaea; color:#e53935; }
    .vbtn-del:hover { background:#ffcdd2; }
    .drawer-empty { text-align:center; color:#bbb; padding:40px 20px; font-size:14px; line-height:1.8; }

    /* ===== 打印样式 ===== */
    @media print {
      body { height:auto; overflow:visible; }
      header .header-btns, .panel-footer, .progress-bar,
      .export-wrap, .icon-btn, #print-panel-label { display:none!important; }
      .workspace { grid-template-columns:1fr; height:auto; overflow:visible; }
      .panel { box-shadow:none; border:1px solid #ddd; page-break-inside:avoid; }
      body::before { content: attr(data-print-title); display:block; font-size:18px; font-weight:bold; padding:16px; }
    }

    @media (max-width:900px) {
      .workspace { grid-template-columns:1fr; overflow-y:auto; }
      .panel { min-height:280px; }
    }
  </style>
</head>

<!-- 打印用隐藏div -->
<div id="print-area" style="display:none;"></div>

<script>
// ===== 字数统计 =====
const MAX_CHARS = 8000;
function updateCount(id, text) {
  const n = text.length;
  const el = document.getElementById('count-' + id);
  el.textContent = n + ' 字';
  el.classList.add('pulse');
  setTimeout(() => el.classList.remove('pulse'), 300);
  document.getElementById('prog-' + id).style.width = Math.min(n / MAX_CHARS * 100, 100) + '%';
  localStorage.setItem('course_' + id, text);
}
function clearPanel(id) {
  if (!confirm('确定清空此栏内容？')) return;
  document.getElementById('textarea-' + id).value = '';
  updateCount(id, '');
}
function copyPanel(id) {
  const text = document.getElementById('textarea-' + id).value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target; const orig = btn.textContent;
    btn.textContent = '✓'; setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ===== 初始化 =====
window.addEventListener('DOMContentLoaded', () => {
  ['design','ppt','script'].forEach(id => {
    const saved = localStorage.getItem('course_' + id);
    if (saved) { document.getElementById('textarea-' + id).value = saved; updateCount(id, saved); }
  });
  loadVoices();
  // 从 URL 参数加载版本
  const params = new URLSearchParams(location.search);
  const loadId = params.get('load');
  if (loadId) loadVersionById(loadId);
  // 关闭导出菜单
  document.addEventListener('click', e => {
    if (!e.target.closest('.export-wrap')) {
      document.querySelectorAll('.export-menu').forEach(m => m.classList.remove('open'));
    }
  });
});

// ===== 导出下拉 =====
function toggleExportMenu(id) {
  const menu = document.getElementById('em-' + id);
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.export-menu').forEach(m => m.classList.remove('open'));
  if (!isOpen) menu.classList.add('open');
}

// ===== 导出功能 =====
function getDateStr() {
  return new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
}
function getText(id) { return document.getElementById('textarea-' + id).value; }

// Word (.docx)
async function exportDocx(id, label) {
  document.querySelectorAll('.export-menu').forEach(m => m.classList.remove('open'));
  const text = getText(id);
  if (!text) { alert('内容为空，无法导出'); return; }
  if (typeof docx === 'undefined') { alert('Word 导出库加载中，请稍后再试'); return; }
  const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;
  const lines = text.split('\n');
  const paragraphs = [
    new Paragraph({ text: label, heading: HeadingLevel.HEADING_1 }),
    ...lines.map(line => new Paragraph({ children: [new TextRun({ text: line, size: 24 })] }))
  ];
  const doc = new Document({ sections: [{ properties:{}, children: paragraphs }] });
  const blob = await Packer.toBlob(doc);
  triggerDownload(blob, label + '-' + getDateStr() + '.docx');
}

// PDF (打印)
function exportPDF(id, label) {
  document.querySelectorAll('.export-menu').forEach(m => m.classList.remove('open'));
  const text = getText(id);
  if (!text) { alert('内容为空，无法导出'); return; }
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>${label}</title>
    <style>body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;padding:32px;line-height:1.9;color:#222;font-size:14px;}
    h1{font-size:18px;margin-bottom:20px;color:#1a1a2e;}pre{white-space:pre-wrap;word-break:break-word;}</style>
    </head><body><h1>${label}</h1><pre>${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
    <script>window.onload=()=>{window.print();}<\/script></body></html>`);
  win.document.close();
}

// Excel (.xlsx)
function exportExcel(id, label) {
  document.querySelectorAll('.export-menu').forEach(m => m.classList.remove('open'));
  const text = getText(id);
  if (!text) { alert('内容为空，无法导出'); return; }
  if (typeof XLSX === 'undefined') { alert('Excel 导出库加载中，请稍后再试'); return; }
  const lines = text.split('\n').map(line => [line]);
  const ws = XLSX.utils.aoa_to_sheet([[label], ...lines]);
  ws['!cols'] = [{ wch: 80 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, label.slice(0,31));
  XLSX.writeFile(wb, label + '-' + getDateStr() + '.xlsx');
}

// Markdown
function exportMd(id, label) {
  document.querySelectorAll('.export-menu').forEach(m => m.classList.remove('open'));
  const text = getText(id);
  if (!text) { alert('内容为空，无法导出'); return; }
  const md = `# ${label}\n\n> 导出时间：${getDateStr()}\n\n---\n\n${text}`;
  triggerDownload(new Blob([md], {type:'text/markdown;charset=utf-8'}), label + '-' + getDateStr() + '.md');
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// ===== 版本保存 =====
function openSaveModal() {
  document.getElementById('v-title').value = '';
  document.getElementById('v-desc').value = '';
  document.getElementById('save-modal').classList.add('open');
  setTimeout(() => document.getElementById('v-title').focus(), 100);
}
function closeSaveModal() { document.getElementById('save-modal').classList.remove('open'); }
document.getElementById('save-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('save-modal')) closeSaveModal();
});

function saveVersion() {
  const title = document.getElementById('v-title').value.trim();
  if (!title) { alert('请填写版本标题'); document.getElementById('v-title').focus(); return; }
  const version = {
    id: 'v_' + Date.now(),
    title,
    desc: document.getElementById('v-desc').value.trim(),
    createdAt: new Date().toISOString(),
    design: getText('design'),
    ppt: getText('ppt'),
    script: getText('script')
  };
  const versions = getVersions();
  versions.unshift(version);
  localStorage.setItem('course_versions', JSON.stringify(versions));
  closeSaveModal();
  showToast('✅ 版本「' + title + '」已保存');
}

function getVersions() {
  try { return JSON.parse(localStorage.getItem('course_versions') || '[]'); } catch { return []; }
}

// ===== 版本历史抽屉 =====
function openVersionDrawer() {
  renderVersionList();
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('version-drawer').classList.add('open');
}
function closeVersionDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('version-drawer').classList.remove('open');
}

function renderVersionList() {
  const versions = getVersions();
  const el = document.getElementById('version-list');
  if (!versions.length) {
    el.innerHTML = '<div class="drawer-empty">📭 还没有保存任何版本<br>填写内容后点击「💾 保存版本」</div>';
    return;
  }
  el.innerHTML = versions.map(v => {
    const d = new Date(v.createdAt);
    const dateStr = d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    return `<div class="version-card">
      <div class="version-title">${escapeHtml(v.title)}</div>
      ${v.desc ? `<div class="version-desc">${escapeHtml(v.desc)}</div>` : ''}
      <div class="version-meta">${dateStr}</div>
      <div class="version-counts">
        <span class="vc1">课程设计 ${v.design.length}字</span>
        <span class="vc2">PPT ${v.ppt.length}字</span>
        <span class="vc3">逐字稿 ${v.script.length}字</span>
      </div>
      <div class="version-actions">
        <button class="vbtn vbtn-load" onclick="loadVersion('${v.id}')">📂 加载</button>
        <button class="vbtn vbtn-del" onclick="deleteVersion('${v.id}')">🗑 删除</button>
      </div>
    </div>`;
  }).join('');
}

function loadVersion(id) {
  const v = getVersions().find(x => x.id === id);
  if (!v) return;
  if (!confirm(`加载版本「${v.title}」？当前未保存内容将被覆盖。`)) return;
  ['design','ppt','script'].forEach(key => {
    document.getElementById('textarea-' + key).value = v[key] || '';
    updateCount(key, v[key] || '');
  });
  closeVersionDrawer();
  showToast('📂 已加载：' + v.title);
}

function loadVersionById(id) {
  const v = getVersions().find(x => x.id === id);
  if (!v) return;
  ['design','ppt','script'].forEach(key => {
    document.getElementById('textarea-' + key).value = v[key] || '';
    updateCount(key, v[key] || '');
  });
  // 清除 URL 参数
  history.replaceState(null, '', location.pathname);
  showToast('📂 已加载：' + v.title);
}

function deleteVersion(id) {
  const versions = getVersions();
  const v = versions.find(x => x.id === id);
  if (!v || !confirm(`确定删除版本「${v.title}」？`)) return;
  const updated = versions.filter(x => x.id !== id);
  localStorage.setItem('course_versions', JSON.stringify(updated));
  renderVersionList();
}

// ===== 工具函数 =====
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:8px;font-size:13px;z-index:1000;transition:opacity .3s;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.opacity = '0', 2500);
}

// ===== TTS =====
let synth = window.speechSynthesis, utterance = null, isPaused = false, voices = [];
function loadVoices() {
  const doLoad = () => {
    voices = synth.getVoices();
    const sel = document.getElementById('voice-select'); sel.innerHTML = '';
    const zh = voices.filter(v => v.lang.startsWith('zh'));
    const other = voices.filter(v => !v.lang.startsWith('zh'));
    if (!voices.length) { sel.innerHTML = '<option value="">默认声音</option>'; return; }
    [...zh, ...other].forEach(v => {
      const o = document.createElement('option');
      o.value = voices.indexOf(v);
      o.textContent = (v.lang.startsWith('zh') ? '🇨🇳 ' : '') + v.name.slice(0,12);
      sel.appendChild(o);
    });
  };
  doLoad();
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = doLoad;
}
function togglePlay() {
  const text = document.getElementById('textarea-script').value.trim();
  if (!text) { setStatus('请先输入逐字稿'); return; }
  if (synth.speaking && !isPaused) {
    synth.pause(); isPaused = true;
    document.getElementById('btn-play').innerHTML = '▶ 继续'; setStatus('已暂停'); return;
  }
  if (isPaused) {
    synth.resume(); isPaused = false;
    document.getElementById('btn-play').innerHTML = '⏸ 暂停'; setStatus('播放中...', true); return;
  }
  stopTTS();
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = parseFloat(document.getElementById('speed-select').value);
  const idx = document.getElementById('voice-select').value;
  if (idx !== '' && voices[parseInt(idx)]) utterance.voice = voices[parseInt(idx)];
  utterance.onstart = () => { document.getElementById('btn-play').innerHTML = '⏸ 暂停'; document.getElementById('btn-play').classList.add('playing'); setStatus('播放中...', true); };
  utterance.onend = () => { document.getElementById('btn-play').innerHTML = '▶ 播放'; document.getElementById('btn-play').classList.remove('playing'); setStatus('播放完毕 ✓'); isPaused = false; };
  utterance.onerror = () => { document.getElementById('btn-play').innerHTML = '▶ 播放'; document.getElementById('btn-play').classList.remove('playing'); setStatus('出错'); isPaused = false; };
  synth.speak(utterance);
}
function stopTTS() {
  synth.cancel(); isPaused = false;
  document.getElementById('btn-play').innerHTML = '▶ 播放';
  document.getElementById('btn-play').classList.remove('playing');
  setStatus('已停止');
}
function setStatus(msg, active) {
  const el = document.getElementById('tts-status');
  el.textContent = msg; el.className = 'tts-status' + (active ? ' active' : '');
}

.ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.c1 .ic{background:#e8f4fd;}.c2 .ic{background:#e8f8f0;}.c3 .ic{background:#fef3e8;}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
.c1 .badge{background:#e8f4fd;color:#1a73e8;}.c2 .badge{background:#e8f8f0;color:#0f9d58;}.c3 .badge{background:#fef3e8;color:#f4511e;}
.content{flex:1;padding:14px 16px;font-size:14px;line-height:1.9;color:#333;white-space:pre-wrap;word-break:break-word;overflow-y:auto;}
.empty{color:#bbb;font-style:italic;}
.tts-bar{padding:10px 16px;border-top:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;background:#fafafa;flex-shrink:0;}
.btn{border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:500;}
.bp{background:linear-gradient(135deg,#f4511e,#ff7043);color:white;}.bs{background:#f5f5f5;color:#888;}
select{border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-size:12px;background:white;color:#555;}
.ts{font-size:12px;color:#999;flex:1;}.ts.a{color:#f4511e;}
@media(max-width:900px){.workspace{grid-template-columns:1fr;}}</style></head>
<body>
<header><h1>📚 课程设计</h1><div class="sub">导出时间：${dateStr} · 只读预览（逐字稿可播放语音）</div></header>
<div class="workspace">
<div class="panel c1"><div class="ph"><div class="pt"><div class="ic">📝</div>课程设计</div><span class="badge">${design.length} 字</span></div>
<div class="content${design?'':' empty'}">${design?esc(design):'（无内容）'}</div></div>
<div class="panel c2"><div class="ph"><div class="pt"><div class="ic">🖼️</div>PPT 内容</div><span class="badge">${ppt.length} 字</span></div>
<div class="content${ppt?'':' empty'}">${ppt?esc(ppt):'（无内容）'}</div></div>
<div class="panel c3"><div class="ph"><div class="pt"><div class="ic">🎙️</div>课程逐字稿</div><span class="badge">${script.length} 字</span></div>
<div class="content${script?'':' empty'}">${script?esc(script):'（无内容）'}</div>
<div class="tts-bar">
<button class="btn bp" id="pp" onclick="tp()">▶ 播放</button>
<button class="btn bs" onclick="st()">■ 停止</button>
<select id="sp"><option value="0.7">慢速</option><option value="0.85">较慢</option><option value="1.0" selected>正常</option><option value="1.2">较快</option><option value="1.5">快速</option></select>
<select id="vs"></select><span class="ts" id="ts">就绪</span></div></div></div>
<script>
const ST=${JSON.stringify(script)};let sy=window.speechSynthesis,ut=null,ip=false,vs=[];
function lv(){const d=()=>{vs=sy.getVoices();const s=document.getElementById('vs');s.innerHTML='';
const zh=vs.filter(v=>v.lang.startsWith('zh'));[...zh,...vs.filter(v=>!v.lang.startsWith('zh'))].forEach(v=>{
const o=document.createElement('option');o.value=vs.indexOf(v);o.textContent=(v.lang.startsWith('zh')?'🇨🇳 ':'')+v.name.slice(0,12);s.appendChild(o);});
if(!vs.length)s.innerHTML='<option>默认</option>';};d();if(sy.onvoiceschanged!==undefined)sy.onvoiceschanged=d;}lv();
function tp(){if(!ST){alert('无内容');return;}
if(sy.speaking&&!ip){sy.pause();ip=true;document.getElementById('pp').innerHTML='▶ 继续';ss('已暂停');return;}
if(ip){sy.resume();ip=false;document.getElementById('pp').innerHTML='⏸ 暂停';ss('播放中...',true);return;}
st();ut=new SpeechSynthesisUtterance(ST);ut.rate=parseFloat(document.getElementById('sp').value);
const i=document.getElementById('vs').value;if(i!==''&&vs[parseInt(i)])ut.voice=vs[parseInt(i)];
ut.onstart=()=>{document.getElementById('pp').innerHTML='⏸ 暂停';ss('播放中...',true);};
ut.onend=()=>{document.getElementById('pp').innerHTML='▶ 播放';ss('播放完毕 ✓');ip=false;};
ut.onerror=()=>{document.getElementById('pp').innerHTML='▶ 播放';ss('出错');ip=false;};sy.speak(ut);}
function st(){sy.cancel();ip=false;document.getElementById('pp').innerHTML='▶ 播放';ss('已停止');}
function ss(m,a){const e=document.getElementById('ts');e.textContent=m;e.className='ts'+(a?' a':'');}
<\/script></body></html>`;
